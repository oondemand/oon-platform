name: ci

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck core-front
        run: npm run typecheck -w @oondemand/oon-core-front

      - name: Build core-front
        run: npm run build -w @oondemand/oon-core-front

      - name: Test core-front
        run: npm test -w @oondemand/oon-core-front

      - name: Test core-back
        run: npm test -w @oondemand/oon-core-back
