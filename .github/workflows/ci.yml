name: ci

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          show-progress: false

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci --silent

      - name: Typecheck core-front
        id: typecheck
        continue-on-error: true
        run: npm run typecheck -w @oondemand/oon-core-front > typecheck.log 2>&1

      - name: Upload typecheck log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: typecheck-log
          path: typecheck.log
          if-no-files-found: error

      - name: Fail on typecheck error
        if: steps.typecheck.outcome == 'failure'
        run: |
          cat typecheck.log
          exit 1

      - name: Build core-front
        run: npm run build -w @oondemand/oon-core-front

      - name: Test core-front
        id: test_front
        continue-on-error: true
        run: npm test -w @oondemand/oon-core-front > test-front.log 2>&1

      - name: Upload core-front test log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: core-front-test-log
          path: test-front.log
          if-no-files-found: error

      - name: Fail on core-front test error
        if: steps.test_front.outcome == 'failure'
        run: |
          cat test-front.log
          exit 1

      - name: Test core-back
        run: npm test -w @oondemand/oon-core-back
